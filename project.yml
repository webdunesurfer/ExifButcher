name: ExifButcher
options:
  bundleIdPrefix: info.in4net
targets:
  ExifButcher:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources: [Sources]
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        NSServices:
          - NSMenuItem:
              default: Adjust RAWs EXIF
            NSMessage: processFolder
            NSPortName: ExifButcher
            NSRequiredContext:
              NSTextContent: FilePath
            NSSendTypes:
              - public.folder
              - public.directory
        CFBundleName: ExifButcher
        CFBundleDisplayName: ExifButcher
        CFBundleIdentifier: info.in4net.ExifButcher
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "13.0"
    entitlements:
      path: ExifButcher.entitlements
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: 5.0
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postCompileScripts:
      - script: |
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp -r "$SRCROOT/Resources/exiftool" "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/"
        name: Copy ExifTool
