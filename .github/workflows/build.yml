name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Homebrew
      uses: Homebrew/actions/setup-homebrew@main

    - name: Install xcodegen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build with xcodebuild
      run: xcodebuild -project ExifButcher.xcodeproj -scheme ExifButcher -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    - name: Create macOS Installer (.pkg)
      run: pkgbuild --component build/Release/ExifButcher.app --install-location /Applications ExifButcher.pkg

    - name: Create Disk Image (.dmg)
      run: hdiutil create -volname ExifButcher -srcfolder build/Release/ExifButcher.app -ov -format UDZO ExifButcher.dmg
        
    - name: Upload Installer Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ExifButcher-Installers
        path: |
          ExifButcher.pkg
          ExifButcher.dmg
